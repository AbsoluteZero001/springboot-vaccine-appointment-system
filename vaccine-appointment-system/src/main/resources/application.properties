spring.application.name=vaccine-appointment-system

# Server port
server.port=8080

# Database configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/vaccine_appointment_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=
spring.data.redis.timeout=5000ms

# JWT configuration
jwt.secret=your-secret-key-change-in-production
jwt.expiration.ms=86400000

# Caching configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# Spring Security configuration (disable security for now, we'll add later)
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# OpenAPI (Swagger) configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Logging
logging.level.com.springboot.vaccineappointmentsystem=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.redis=DEBUG
