# Main configuration file for vaccine appointment system
# To use local configuration, set spring.profiles.active=local
# Local configuration file (application-local.yml) is not tracked by git
spring:
  application:
    name: vaccine-appointment-system
  datasource:
    url: jdbc:mysql://localhost:3306/vaccine_appointment_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: ''
      timeout: 5000ms
  cache:
    type: redis
    redis:
      time-to-live: 600000
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.springboot.vaccineappointmentsystem: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.redis: DEBUG

jwt:
  secret: your-secret-key-change-in-production
  expiration:
    ms: 86400000