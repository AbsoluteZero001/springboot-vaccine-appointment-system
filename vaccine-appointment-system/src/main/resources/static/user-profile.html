<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的预约 - 疫苗预约系统</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>

<header class="site-header">
    <div class="container">
        <a href="index.html" class="logo">
            <div class="logo-icon">💉</div>
            <span class="logo-text">疫苗预约系统</span>
        </a>
        <nav class="main-nav">
            <a href="user-dashboard.html">疫苗列表</a>
            <a href="user-profile.html" class="active">我的预约</a>
            <a href="#" onclick="logout()">退出登录</a>
        </nav>
    </div>
</header>

    <div class="container">
        <div id="alert-container"></div>

        <div class="dashboard-banner" style="margin-bottom: 28px;">
            <div>
                <h2>我的预约</h2>
                <p>管理您的疫苗接种预约和接种记录</p>
            </div>
            <div class="banner-stats">
                <div class="banner-stat">
                    <h3 id="pendingCount">0</h3>
                    <p>待处理</p>
                </div>
                <div class="banner-stat">
                    <h3 id="completedCount">0</h3>
                    <p>已完成</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>预约记录</h2>
            <table id="appointments-table">
                <thead>
                    <tr>
                        <th>编号</th>
                        <th>疫苗名称</th>
                        <th>品牌/规格</th>
                        <th>预约时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2>接种记录</h2>
            <table id="records-table">
                <thead>
                    <tr>
                        <th>编号</th>
                        <th>疫苗名称</th>
                        <th>品牌/规格</th>
                        <th>接种时间</th>
                        <th>状态</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

<footer class="footer">
    <div class="container">
        <p>疫苗预约系统 © 2026 | 守护健康，疫苗先行</p>
    </div>
</footer>

    <script src="app.js"></script>
    <script>
        const user = getUser();
        if (!user) {
            window.location.href = 'index.html';
        }

        // Status labels
        const STATUS = {
            0: {text: '待确认', class: 'status-pending'},
            1: {text: '已确认', class: 'status-confirmed'},
            2: {text: '已完成', class: 'status-completed'},
            3: {text: '已取消', class: 'status-cancelled'}
        };

        // Load appointments
        async function loadAppointments() {
            try {
                const data = await apiCall(`/appointments/user/${user.id}`);
                const tbody = document.querySelector('#appointments-table tbody');
                tbody.innerHTML = '';
                let pending = 0, completed = 0;

                data.forEach(appt => {
                    const st = STATUS[appt.status] || {text: '未知', class: ''};
                    if (appt.status === 0 || appt.status === 1) pending++;
                    if (appt.status === 2) completed++;

                    const v = appt.vaccine || {};
                    const spec = [v.brand, v.dosage].filter(Boolean).join(' | ') || '—';

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${appt.id}</td>
                        <td>${v.name || '—'}</td>
                        <td style="font-size:0.85rem; color: var(--gray-color);">${spec}</td>
                        <td>${new Date(appt.appointmentTime).toLocaleString('zh-CN')}</td>
                        <td><span style="padding:3px 12px; border-radius:50px; font-size:0.8rem; font-weight:600;
                            background: ${appt.status === 0 ? '#fff7ed' : appt.status === 1 ? '#f0fdf4' : appt.status === 2 ? '#eff6ff' : '#f5f5f5'};
                            color: ${appt.status === 0 ? '#c2410c' : appt.status === 1 ? '#16a34a' : appt.status === 2 ? '#2563eb' : '#6b7280'};">${st.text}</span></td>
                        <td>
                            ${appt.status === 0 || appt.status === 1 ?
                        `<button class="btn btn-danger btn-small" onclick="cancelAppointment(${appt.id})">取消预约</button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('pendingCount').textContent = pending;
                document.getElementById('completedCount').textContent = completed;

            } catch (error) {
                showAlert('加载预约记录失败', 'error');
            }
        }

        // Load vaccination records
        async function loadVaccinationRecords() {
            try {
                const data = await apiCall(`/vaccination-records/user/${user.id}`);
                const tbody = document.querySelector('#records-table tbody');
                tbody.innerHTML = '';
                data.forEach(record => {
                    const v = record.vaccine || {};
                    const spec = [v.brand, v.dosage].filter(Boolean).join(' | ') || '—';
                    const statusText = record.status === 0 ? '已预约' : '已接种';
                    const statusColor = record.status === 0 ? '#c2410c' : '#16a34a';
                    const statusBg = record.status === 0 ? '#fff7ed' : '#f0fdf4';

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${record.id}</td>
                        <td>${v.name || '—'}</td>
                        <td style="font-size:0.85rem; color: var(--gray-color);">${spec}</td>
                        <td>${new Date(record.vaccinationTime).toLocaleString('zh-CN')}</td>
                        <td><span style="padding:3px 12px; border-radius:50px; font-size:0.8rem; font-weight:600; background:${statusBg}; color:${statusColor};">${statusText}</span></td>
                        <td>${record.notes || '—'}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                // Ignore if no records
            }
        }

        // Cancel appointment
        async function cancelAppointment(appointmentId) {
            if (!confirm('确定要取消此预约吗？')) return;
            try {
                await apiCall(`/appointments/${appointmentId}/cancel`, {
                    method: 'POST',
                    body: JSON.stringify({ userId: user.id })
                });
                showAlert('预约已取消', 'success');
                loadAppointments();
            } catch (error) {
                showAlert(error.message || '取消失败', 'error');
            }
        }

        loadAppointments();
        loadVaccinationRecords();
    </script>
</body>
</html>
