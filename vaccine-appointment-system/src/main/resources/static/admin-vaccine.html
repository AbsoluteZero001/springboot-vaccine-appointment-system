<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Vaccines - Vaccine Appointment System</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="header">
        <div class="navbar">
            <h1>Vaccine Appointment System - Manage Vaccines</h1>
            <div class="nav-links">
                <a href="admin-dashboard.html">Dashboard</a>
                <a href="admin-vaccine.html">Manage Vaccines</a>
                <a href="admin-users.html">Manage Users</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="alert-container"></div>
        <div class="card">
            <h2>Add New Vaccine</h2>
            <form id="add-vaccine-form">
                <div class="form-group">
                    <label for="vaccine-name">Vaccine Name</label>
                    <input type="text" id="vaccine-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="vaccine-manufacturer">Manufacturer</label>
                    <input type="text" id="vaccine-manufacturer" class="form-control">
                </div>
                <div class="form-group">
                    <label for="vaccine-description">Description</label>
                    <textarea id="vaccine-description" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="vaccine-stock">Stock Quantity</label>
                    <input type="number" id="vaccine-stock" class="form-control" value="0" min="0" required>
                </div>
                <div class="form-group">
                    <label for="vaccine-available">
                        <input type="checkbox" id="vaccine-available" checked> Available
                    </label>
                </div>
                <button type="submit" class="btn">Add Vaccine</button>
            </form>
        </div>

        <div class="card">
            <h2>Vaccine List</h2>
            <table id="vaccines-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Manufacturer</th>
                        <th>Stock</th>
                        <th>Available</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Vaccines will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Check authentication
        const admin = getAdmin();
        if (!admin) {
            window.location.href = 'index.html';
        }

        // Load vaccines
        async function loadVaccines() {
            try {
                const data = await apiCall('/vaccines');
                const tbody = document.querySelector('#vaccines-table tbody');
                tbody.innerHTML = '';
                data.forEach(vaccine => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${vaccine.id}</td>
                        <td>${vaccine.name}</td>
                        <td>${vaccine.manufacturer || 'N/A'}</td>
                        <td>${vaccine.stockQuantity}</td>
                        <td>${vaccine.available ? 'Yes' : 'No'}</td>
                        <td>
                            <button class="btn btn-small" onclick="editVaccine(${vaccine.id})">Edit</button>
                            <button class="btn btn-danger btn-small" onclick="deleteVaccine(${vaccine.id})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                showAlert('Failed to load vaccines', 'error');
            }
        }

        // Add vaccine
        document.getElementById('add-vaccine-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const vaccine = {
                name: document.getElementById('vaccine-name').value,
                manufacturer: document.getElementById('vaccine-manufacturer').value || null,
                description: document.getElementById('vaccine-description').value || null,
                stockQuantity: parseInt(document.getElementById('vaccine-stock').value),
                available: document.getElementById('vaccine-available').checked
            };
            try {
                await apiCall('/vaccines', {
                    method: 'POST',
                    body: JSON.stringify(vaccine)
                });
                showAlert('Vaccine added successfully', 'success');
                loadVaccines();
                // Reset form
                document.getElementById('add-vaccine-form').reset();
            } catch (error) {
                showAlert(error.message || 'Failed to add vaccine', 'error');
            }
        });

        // Edit vaccine (simplified - just open prompt)
        async function editVaccine(vaccineId) {
            // In a real app, you'd have a proper edit form
            const newStock = prompt('Enter new stock quantity:');
            if (newStock === null) return;
            try {
                await apiCall(`/vaccines/${vaccineId}/stock`, {
                    method: 'PATCH',
                    body: JSON.stringify({ quantity: parseInt(newStock) })
                });
                showAlert('Stock updated successfully', 'success');
                loadVaccines();
            } catch (error) {
                showAlert(error.message || 'Failed to update vaccine', 'error');
            }
        }

        // Delete vaccine
        async function deleteVaccine(vaccineId) {
            if (!confirm('Are you sure you want to delete this vaccine?')) return;
            try {
                await apiCall(`/vaccines/${vaccineId}`, {
                    method: 'DELETE'
                });
                showAlert('Vaccine deleted successfully', 'success');
                loadVaccines();
            } catch (error) {
                showAlert(error.message || 'Failed to delete vaccine', 'error');
            }
        }

        // Initialize
        loadVaccines();
    </script>
</body>
</html>
